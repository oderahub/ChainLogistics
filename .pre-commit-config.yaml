repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-yaml

  - repo: local
    hooks:
      - id: frontend-eslint
        name: frontend-eslint
        entry: bash -lc 'cd frontend && npm run lint'
        language: system
        pass_filenames: false

      - id: rust-clippy-smart-contract
        name: rust-clippy-smart-contract
        entry: cargo clippy --manifest-path smart-contract/Cargo.toml --all-targets --all-features
        language: system
        pass_filenames: false

      - id: rust-clippy-backend
        name: rust-clippy-backend
        entry: cargo clippy --manifest-path backend/Cargo.toml --all-targets --all-features
        language: system
        pass_filenames: false

      - id: rust-clippy-sdk-rust
        name: rust-clippy-sdk-rust
        entry: cargo clippy --manifest-path sdk/rust/Cargo.toml --all-targets --all-features
        language: system
        pass_filenames: false
