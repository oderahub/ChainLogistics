name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get version from tag
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

    - name: Generate changelog
      id: changelog
      run: |
        # Get previous tag
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD~1 2>/dev/null || echo "")
        if [ -z "$PREVIOUS_TAG" ]; then
          PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
        fi

        # Generate changelog
        echo "## What's Changed" > changelog.md
        echo "" >> changelog.md
        git log --pretty=format:"* %s (%h)" --no-merges ${PREVIOUS_TAG}..HEAD >> changelog.md
        echo "" >> changelog.md
        echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${{ github.ref }}" >> changelog.md

        # Set output
        {
          echo 'changelog<<EOF'
          cat changelog.md
          echo EOF
        } >> $GITHUB_OUTPUT

    - name: Build Rust contracts
      working-directory: ./smart-contract
      run: |
        curl -L https://github.com/stellar/soroban-cli/releases/latest/download/soroban-cli-linux-x64.tar.gz | tar xz
        sudo mv soroban /usr/local/bin/
        cargo build --release --target wasm32-unknown-unknown

    - name: Build frontend
      working-directory: ./frontend
      run: |
        npm ci
        npm run build
        tar -czf frontend-build.tar.gz .next/

    - name: Create release archives
      run: |
        mkdir -p release-artifacts
        cp smart-contract/target/wasm32-unknown-unknown/release/*.wasm release-artifacts/
        cp frontend/frontend-build.tar.gz release-artifacts/

    - name: Create GitHub release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.get_version.outputs.version }}
        body: ${{ steps.changelog.outputs.changelog }}
        draft: false
        prerelease: false

    - name: Upload release assets
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./release-artifacts/
        asset_name: chainlogistics-${{ steps.get_version.outputs.version }}
        asset_content_type: application/zip

  publish-frontend:
    name: Publish Frontend
    runs-on: ubuntu-latest
    needs: release

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    - name: Deploy to Vercel (if configured)
      if: env.VERCEL_TOKEN != ''
      run: |
        npm install -g vercel
        cd frontend
        vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}

    - name: Deploy to GitHub Pages (fallback)
      if: env.VERCEL_TOKEN == ''
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend/.next
        cname: chainlogistics.vercel.app
