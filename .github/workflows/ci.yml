name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-tests:
    name: Rust Tests & Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./smart-contract

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Install Soroban CLI
      run: |
        curl -L https://github.com/stellar/soroban-cli/releases/latest/download/soroban-cli-linux-x64.tar.gz | tar xz
        sudo mv soroban /usr/local/bin/

    - name: Cache Cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-

    - name: Cache Cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-build-

    - name: Check formatting
      run: cargo fmt --all -- --check

    - name: Run clippy
      run: cargo clippy --all-targets --all-features -- -D warnings

    - name: Run tests
      run: cargo test --release --all-features

    - name: Build WASM contracts
      run: cargo build --release --target wasm32-unknown-unknown

  frontend-tests:
    name: Frontend Tests & Quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Type checking
      run: npm run build --if-present

    - name: Lint code
      run: npm run lint --if-present

    - name: Run tests
      run: npm test --if-present

    - name: Build verification
      run: npm run build

  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [rust-tests, frontend-tests]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Verify all builds successful
      run: echo "All builds completed successfully"

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: |
          smart-contract/target/wasm32-unknown-unknown/release/*.wasm
          frontend/.next/
        retention-days: 7
