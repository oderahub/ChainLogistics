name: Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production

jobs:
  deploy-contracts:
    name: Deploy Smart Contracts
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown

    - name: Install Soroban CLI
      run: |
        curl -L https://github.com/stellar/soroban-cli/releases/latest/download/soroban-cli-linux-x64.tar.gz | tar xz
        sudo mv soroban /usr/local/bin/

    - name: Build contracts
      working-directory: ./smart-contract
      run: cargo build --release --target wasm32-unknown-unknown

    - name: Configure Soroban network
      run: |
        NETWORK=${{ github.event.inputs.environment || 'staging' }}
        if [ "$NETWORK" = "production" ]; then
          echo "SOROBAN_RPC_URL=https://soroban-rpc.mainnet.stellar.org" >> $GITHUB_ENV
          echo "SOROBAN_NETWORK_PASSPHRASE=Public Global Stellar Network ; September 2015" >> $GITHUB_ENV
        else
          echo "SOROBAN_RPC_URL=https://soroban-testnet.stellar.org" >> $GITHUB_ENV
          echo "SOROBAN_NETWORK_PASSPHRASE=Test SDF Network ; September 2015" >> $GITHUB_ENV
        fi

    - name: Deploy contracts
      env:
        SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_SECRET_KEY }}
      run: |
        # Deploy each contract
        for wasm_file in smart-contract/target/wasm32-unknown-unknown/release/*.wasm; do
          echo "Deploying $(basename $wasm_file .wasm)..."
          CONTRACT_ID=$(soroban contract deploy \
            --wasm $wasm_file \
            --secret-key $SOROBAN_SECRET_KEY \
            --rpc-url $SOROBAN_RPC_URL \
            --network-passphrase "$SOROBAN_NETWORK_PASSPHRASE")
          echo "Deployed contract: $CONTRACT_ID"
          echo "$CONTRACT_ID" >> deployed_contracts.txt
        done

    - name: Initialize contracts
      env:
        SOROBAN_SECRET_KEY: ${{ secrets.SOROBAN_SECRET_KEY }}
      run: |
        # Read deployed contract IDs and initialize them
        while read CONTRACT_ID; do
          echo "Initializing contract $CONTRACT_ID..."
          # Add initialization logic here based on your contract requirements
        done < deployed_contracts.txt

    - name: Health check
      run: |
        echo "Performing health checks..."
        # Add health check logic to verify contracts are working

    - name: Update deployment status
      run: |
        echo "deployment_status=success" >> $GITHUB_ENV

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'staging' }}
    needs: deploy-contracts

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Update environment variables
      working-directory: ./frontend
      run: |
        NETWORK=${{ github.event.inputs.environment || 'staging' }}
        if [ "$NETWORK" = "production" ]; then
          echo "NEXT_PUBLIC_CONTRACT_ID=${{ secrets.PRODUCTION_CONTRACT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_STELLAR_NETWORK=mainnet" >> .env.local
          echo "NEXT_PUBLIC_RPC_URL=https://soroban-rpc.mainnet.stellar.org" >> .env.local
        else
          echo "NEXT_PUBLIC_CONTRACT_ID=${{ secrets.STAGING_CONTRACT_ID }}" >> .env.local
          echo "NEXT_PUBLIC_STELLAR_NETWORK=testnet" >> .env.local
          echo "NEXT_PUBLIC_RPC_URL=https://soroban-testnet.stellar.org" >> .env.local
        fi

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    - name: Deploy to Vercel
      if: env.VERCEL_TOKEN != ''
      run: |
        npm install -g vercel
        cd frontend
        vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}

    - name: Deploy to GitHub Pages (fallback)
      if: env.VERCEL_TOKEN == ''
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./frontend/.next
        cname: ${{ github.event.inputs.environment == 'production' && 'chainlogistics.app' || 'staging.chainlogistics.app' }}

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [deploy-contracts, deploy-frontend]
    if: always()

    steps:
    - name: Notify success
      if: needs.deploy-contracts.result == 'success' && needs.deploy-frontend.result == 'success'
      run: |
        echo "Deployment successful!"
        # Add notification logic here (Slack, email, etc.)

    - name: Notify failure
      if: failure()
      run: |
        echo "Deployment failed!"
        # Add notification logic here (Slack, email, etc.)

  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [deploy-contracts, deploy-frontend]
    if: failure() && github.event_name == 'push'

    steps:
    - name: Rollback contracts
      run: |
        echo "Rolling back contract deployment..."
        # Add rollback logic for contracts

    - name: Rollback frontend
      run: |
        echo "Rolling back frontend deployment..."
        # Add rollback logic for frontend
